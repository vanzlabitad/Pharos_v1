name: Secret scan

# Runs on every push and PR. The same scanner runs in the local pre-commit
# hook, so this is a backstop for the case where someone bypasses the hook
# with --no-verify or pushes from a clone that hasn't installed it.
#
# Fails the build if any forbidden pattern is found:
#   - sk-ant-* (Anthropic API key prefix)
#   - NEXT_PUBLIC_ANTHROPIC (Next.js public env var that would leak the key
#     to the browser bundle)

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so the scanner can see everything

      - name: Run secret scanner
        run: bash scripts/check-secrets.sh --all
