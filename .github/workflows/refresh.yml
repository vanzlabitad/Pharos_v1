name: Weekly data refresh

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh pipeline
        env:
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_PATH: db/pharos.db
        run: python pipeline/run_refresh.py

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Jupyter kernel
        run: pip install jupyter

      - name: Render methodology report
        env:
          DB_PATH: db/pharos.db
        run: quarto render analysis/report.qmd --to html

      - name: Copy report to dashboard
        run: cp analysis/report.html dashboard/public/report.html

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/data/ dashboard/public/report.html
          git diff --staged --quiet || git commit -m "chore: weekly data refresh $(date -u +%Y-%m-%d) [skip ci]"
          git push
